<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <rect width="600" height="400" fill="#0D0D0D" />
  <pattern id="grid2" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1" fill="rgba(255,255,255,0.04)"/>
  </pattern>
  <rect width="600" height="400" fill="url(#grid2)" />

  <!-- Step 1: Company icon -->
  <g transform="translate(48, 160)">
    <rect x="0" y="0" width="80" height="80" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
    <rect x="20" y="20" width="40" height="30" rx="4" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <rect x="30" y="50" width="10" height="12" rx="2" fill="rgba(249,115,22,0.5)"/>
    <rect x="42" y="50" width="10" height="12" rx="2" fill="rgba(249,115,22,0.3)"/>
    <text x="40" y="95" fill="rgba(255,255,255,0.4)" font-family="monospace" font-size="8" text-anchor="middle" letter-spacing="1">COMPANY</text>
  </g>

  <!-- Arrow 1 -->
  <path d="M132 200 L162 200" stroke="rgba(249,115,22,0.5)" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="160,196 168,200 160,204" fill="#f97316" opacity="0.6"/>

  <!-- Step 2: Magnifying glass (AI Research) -->
  <g transform="translate(172, 160)">
    <rect x="0" y="0" width="80" height="80" rx="12" fill="rgba(249,115,22,0.04)" stroke="rgba(249,115,22,0.3)" stroke-width="1.5"/>
    <circle cx="35" cy="33" r="16" fill="none" stroke="#f97316" stroke-width="2.5" opacity="0.8"/>
    <circle cx="35" cy="33" r="8" fill="rgba(249,115,22,0.1)"/>
    <line x1="46" y1="44" x2="58" y2="56" stroke="#f97316" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
    <text x="40" y="95" fill="rgba(249,115,22,0.6)" font-family="monospace" font-size="8" text-anchor="middle" letter-spacing="1">AI RESEARCH</text>
  </g>

  <!-- Arrow 2 -->
  <path d="M256 200 L286 200" stroke="rgba(249,115,22,0.5)" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="284,196 292,200 284,204" fill="#f97316" opacity="0.6"/>

  <!-- Step 3: Personalized email -->
  <g transform="translate(296, 155)">
    <rect x="0" y="0" width="90" height="90" rx="12" fill="rgba(249,115,22,0.04)" stroke="rgba(249,115,22,0.35)" stroke-width="1.5"/>
    <!-- Envelope -->
    <rect x="12" y="20" width="66" height="45" rx="4" fill="rgba(249,115,22,0.08)" stroke="rgba(249,115,22,0.4)" stroke-width="1.5"/>
    <path d="M12 24 L45 44 L78 24" stroke="#f97316" stroke-width="1.5" fill="none" opacity="0.8"/>
    <!-- Content lines -->
    <rect x="18" y="50" width="28" height="3" rx="1" fill="rgba(255,255,255,0.15)"/>
    <rect x="50" y="50" width="20" height="3" rx="1" fill="rgba(249,115,22,0.4)"/>
    <rect x="18" y="57" width="44" height="3" rx="1" fill="rgba(255,255,255,0.1)"/>
    <text x="45" y="105" fill="rgba(249,115,22,0.6)" font-family="monospace" font-size="8" text-anchor="middle" letter-spacing="1">PERSONALIZED</text>
  </g>

  <!-- Arrow 3 -->
  <path d="M390 200 L420 200" stroke="rgba(34,197,94,0.5)" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="418,196 426,200 418,204" fill="#22c55e" opacity="0.6"/>

  <!-- Step 4: Sent checkmark -->
  <g transform="translate(430, 160)">
    <rect x="0" y="0" width="80" height="80" rx="12" fill="rgba(34,197,94,0.04)" stroke="rgba(34,197,94,0.4)" stroke-width="1.5"/>
    <circle cx="40" cy="36" r="22" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.4)" stroke-width="1.5"/>
    <path d="M28 36 L37 46 L54 26" stroke="#22c55e" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="40" y="95" fill="rgba(34,197,94,0.6)" font-family="monospace" font-size="8" text-anchor="middle" letter-spacing="1">SENT ✓</text>
  </g>

  <!-- Sequence badges below -->
  <g transform="translate(170, 310)">
    <rect x="0" y="0" width="70" height="22" rx="11" fill="rgba(249,115,22,0.1)" stroke="rgba(249,115,22,0.3)" stroke-width="1"/>
    <text x="35" y="15" fill="#f97316" font-family="monospace" font-size="8" text-anchor="middle">EMAIL 1</text>
  </g>
  <g transform="translate(260" y="310">
    <rect x="0" y="0" width="70" height="22" rx="11" fill="rgba(249,115,22,0.07)" stroke="rgba(249,115,22,0.2)" stroke-width="1"/>
    <text x="35" y="15" fill="#f97316" font-family="monospace" font-size="8" text-anchor="middle">EMAIL 2</text>
  </g>
  <g transform="translate(350, 310)">
    <rect x="0" y="0" width="70" height="22" rx="11" fill="rgba(249,115,22,0.07)" stroke="rgba(249,115,22,0.2)" stroke-width="1"/>
    <text x="35" y="15" fill="#f97316" font-family="monospace" font-size="8" text-anchor="middle">EMAIL 3</text>
  </g>

  <!-- Bottom label -->
  <text x="300" y="370" fill="rgba(255,255,255,0.2)" font-family="monospace" font-size="9" text-anchor="middle" letter-spacing="2">ZERO MANUAL WORK</text>
</svg>
