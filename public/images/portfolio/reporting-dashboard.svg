<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <rect width="600" height="400" fill="#0D0D0D" />
  
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1" fill="rgba(255,255,255,0.05)"/>
  </pattern>
  <rect width="600" height="400" fill="url(#grid)" />

  <g transform="translate(100, 100)">
    <!-- Data Sources (Blue) -->
    <rect x="0" y="0" width="60" height="40" rx="6" fill="rgba(59,130,246,0.1)" stroke="#3b82f6" stroke-width="1.5"/>
    <rect x="10" y="10" width="15" height="20" fill="#3b82f6" opacity="0.5"/>
    <rect x="30" y="15" width="10" height="15" fill="#3b82f6" opacity="0.8"/>
    
    <rect x="0" y="60" width="60" height="40" rx="6" fill="rgba(59,130,246,0.1)" stroke="#3b82f6" stroke-width="1.5"/>
    <circle cx="30" cy="80" r="12" stroke="#3b82f6" stroke-width="2" fill="none"/>
    <path d="M30 80 L35 75" stroke="#3b82f6" stroke-width="2"/>
    
    <rect x="0" y="120" width="60" height="40" rx="6" fill="rgba(59,130,246,0.1)" stroke="#3b82f6" stroke-width="1.5"/>
    <rect x="15" y="130" width="30" height="4" fill="#3b82f6"/>
    <rect x="15" y="138" width="20" height="4" fill="#3b82f6" opacity="0.6"/>
    <rect x="15" y="146" width="25" height="4" fill="#3b82f6" opacity="0.4"/>

    <!-- Connections -->
    <path d="M60 20 L130 80 M60 80 L130 80 M60 140 L130 80" stroke="rgba(255,255,255,0.1)" stroke-width="2" stroke-dasharray="4,4"/>
    
    <!-- AI Gear (Orange highlight) -->
    <g transform="translate(160, 80)">
      <circle cx="0" cy="0" r="30" fill="#1a1a1a" stroke="#f97316" stroke-width="2"/>
      <path d="M-10 -10 L10 10 M-10 10 L10 -10 M0 -15 L0 15 M-15 0 L15 0" stroke="#f97316" stroke-width="4"/>
      <circle cx="0" cy="0" r="10" fill="#1a1a1a" stroke="#f97316" stroke-width="2"/>
    </g>

    <!-- Output Connection -->
    <path d="M190 80 L260 80" stroke="#22c55e" stroke-width="2" markerEnd="url(#arrow)"/>
    
    <!-- Clean Report Doc (Green) -->
    <g transform="translate(280, 20)">
      <rect x="0" y="0" width="80" height="120" rx="4" fill="rgba(34,197,94,0.1)" stroke="#22c55e" stroke-width="2"/>
      <rect x="15" y="20" width="50" height="6" rx="2" fill="#22c55e"/>
      <rect x="15" y="35" width="40" height="6" rx="2" fill="#22c55e" opacity="0.8"/>
      
      <rect x="15" y="60" width="50" height="30" rx="4" fill="#22c55e" opacity="0.2"/>
      <path d="M20 85 L35 65 L45 75 L60 55" stroke="#22c55e" stroke-width="2" fill="none"/>
    </g>

    <text x="210" y="180" fill="#fff" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">6hrs <tspan fill="#f97316">→</tspan> 20min</text>
  </g>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e" />
    </marker>
  </defs>
</svg>
