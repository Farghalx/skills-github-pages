<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <rect width="600" height="400" fill="#0D0D0D" />
  <pattern id="grid4" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1" fill="rgba(255,255,255,0.04)"/>
  </pattern>
  <rect width="600" height="400" fill="url(#grid4)" />

  <!-- Chat bubble (left) -->
  <g transform="translate(42, 130)">
    <rect x="0" y="0" width="130" height="80" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
    <polygon points="20,80 36,80 20,100" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
    <!-- Chat content -->
    <rect x="12" y="14" width="80" height="5" rx="2" fill="rgba(255,255,255,0.18)"/>
    <rect x="12" y="24" width="100" height="5" rx="2" fill="rgba(255,255,255,0.12)"/>
    <rect x="12" y="34" width="60" height="5" rx="2" fill="rgba(255,255,255,0.12)"/>
    <!-- "YES!" highlight -->
    <rect x="12" y="50" width="34" height="16" rx="6" fill="rgba(34,197,94,0.15)" stroke="rgba(34,197,94,0.4)" stroke-width="1"/>
    <text x="29" y="62" fill="#22c55e" font-family="monospace" font-size="9" font-weight="bold" text-anchor="middle">YES!</text>
    <text x="65" y="112" fill="rgba(255,255,255,0.3)" font-family="monospace" font-size="8" text-anchor="middle" letter-spacing="1">CLIENT CALL</text>
  </g>

  <!-- Arrow -->
  <path d="M178 190 L210 190" stroke="rgba(249,115,22,0.5)" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="208,186 216,190 208,194" fill="#f97316" opacity="0.7"/>

  <!-- AI processing box (center) -->
  <g transform="translate(220, 155)">
    <rect x="0" y="0" width="120" height="70" rx="12" fill="rgba(249,115,22,0.04)" stroke="rgba(249,115,22,0.4)" stroke-width="2"/>
    <circle cx="20" cy="22" r="8" fill="rgba(249,115,22,0.15)" stroke="rgba(249,115,22,0.4)" stroke-width="1.5"/>
    <circle cx="20" cy="22" r="3" fill="#f97316"/>
    <rect x="36" y="16" width="70" height="5" rx="2" fill="rgba(249,115,22,0.3)"/>
    <rect x="36" y="26" width="50" height="4" rx="2" fill="rgba(249,115,22,0.2)"/>
    <rect x="10" y="40" width="100" height="4" rx="2" fill="rgba(255,255,255,0.08)"/>
    <rect x="10" y="50" width="78" height="4" rx="2" fill="rgba(255,255,255,0.08)"/>
    <text x="60" y="90" fill="rgba(249,115,22,0.5)" font-family="monospace" font-size="8" text-anchor="middle" letter-spacing="1">AI GENERATION</text>
  </g>

  <!-- Arrow -->
  <path d="M344 190 L378 190" stroke="rgba(249,115,22,0.5)" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="376,186 384,190 376,194" fill="#f97316" opacity="0.7"/>

  <!-- PDF Document (right) -->
  <g transform="translate(386, 100)">
    <!-- Page shadow -->
    <rect x="8" y="8" width="120" height="170" rx="6" fill="rgba(0,0,0,0.4)"/>
    <!-- Page -->
    <rect x="0" y="0" width="120" height="170" rx="6" fill="rgba(15,15,15,1)" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
    <!-- Page fold corner -->
    <polygon points="90,0 120,0 120,30" fill="rgba(249,115,22,0.15)"/>
    <!-- Branded header bar -->
    <rect x="0" y="0" width="90" height="30" rx="0" fill="rgba(249,115,22,0.12)"/>
    <rect x="0" y="0" width="120" height="30" rx="6" fill="rgba(249,115,22,0.12)"/>
    <rect x="0" y="24" width="120" height="6" fill="rgba(249,115,22,0.12)"/>
    <text x="10" y="19" fill="#f97316" font-family="monospace" font-size="9" font-weight="bold" letter-spacing="1">PROPOSAL</text>
    <!-- Content sections -->
    <rect x="10" y="40" width="60" height="5" rx="2" fill="rgba(255,255,255,0.2)"/>
    <rect x="10" y="50" width="100" height="3" rx="1" fill="rgba(255,255,255,0.08)"/>
    <rect x="10" y="57" width="88" height="3" rx="1" fill="rgba(255,255,255,0.08)"/>
    <rect x="10" y="64" width="94" height="3" rx="1" fill="rgba(255,255,255,0.08)"/>
    <!-- Divider -->
    <rect x="10" y="75" width="100" height="1" rx="1" fill="rgba(255,255,255,0.06)"/>
    <rect x="10" y="82" width="50" height="5" rx="2" fill="rgba(255,255,255,0.15)"/>
    <rect x="10" y="92" width="100" height="3" rx="1" fill="rgba(255,255,255,0.07)"/>
    <rect x="10" y="99" width="80" height="3" rx="1" fill="rgba(255,255,255,0.07)"/>
    <!-- Price line -->
    <rect x="10" y="115" width="100" height="1" rx="1" fill="rgba(255,255,255,0.06)"/>
    <rect x="10" y="122" width="40" height="5" rx="2" fill="rgba(255,255,255,0.12)"/>
    <rect x="70" y="120" width="40" height="9" rx="3" fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.3)" stroke-width="1"/>
    <text x="90" y="128" fill="#22c55e" font-family="monospace" font-size="7" text-anchor="middle">QUOTED</text>
    <!-- Signature area -->
    <rect x="10" y="140" width="60" height="20" rx="4" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <!-- Checkmark badge -->
    <circle cx="100" cy="150" r="14" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.5)" stroke-width="1.5"/>
    <path d="M93 150 L99 156 L110 142" stroke="#22c55e" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="60" y="190" fill="rgba(34,197,94,0.5)" font-family="monospace" font-size="8" text-anchor="middle" letter-spacing="1">DELIVERED IN MINUTES</text>
  </g>
</svg>
