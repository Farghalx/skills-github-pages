<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <rect width="600" height="400" fill="#0D0D0D" />
  <pattern id="grid3" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1" fill="rgba(255,255,255,0.04)"/>
  </pattern>
  <rect width="600" height="400" fill="url(#grid3)" />

  <!-- Central AI Hub -->
  <g transform="translate(300, 200)">
    <circle cx="0" cy="0" r="62" fill="rgba(249,115,22,0.03)" stroke="rgba(249,115,22,0.35)" stroke-width="2"/>
    <circle cx="0" cy="0" r="46" fill="rgba(249,115,22,0.05)" stroke="rgba(249,115,22,0.2)" stroke-width="1.5" stroke-dasharray="4,4"/>
    <circle cx="0" cy="0" r="28" fill="rgba(249,115,22,0.08)" stroke="rgba(249,115,22,0.4)" stroke-width="2"/>
    <text x="0" y="-5" fill="#f97316" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle" letter-spacing="1">AI</text>
    <text x="0" y="9" fill="#f97316" font-family="monospace" font-size="7" text-anchor="middle" letter-spacing="2">EXEC</text>
    <!-- Pulse dot -->
    <circle cx="0" cy="0" r="4" fill="#f97316" opacity="0.9"/>
  </g>

  <!-- Spoke: Calendar (top) -->
  <line x1="300" y1="138" x2="300" y2="80" stroke="rgba(249,115,22,0.25)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <g transform="translate(260, 30)">
    <rect x="0" y="0" width="80" height="50" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
    <rect x="8" y="8" width="64" height="10" rx="2" fill="rgba(249,115,22,0.2)"/>
    <rect x="8" y="22" width="12" height="12" rx="2" fill="rgba(255,255,255,0.08)"/>
    <rect x="24" y="22" width="12" height="12" rx="2" fill="rgba(249,115,22,0.3)"/>
    <rect x="40" y="22" width="12" height="12" rx="2" fill="rgba(255,255,255,0.08)"/>
    <rect x="56" y="22" width="12" height="12" rx="2" fill="rgba(255,255,255,0.08)"/>
    <text x="40" y="62" fill="rgba(255,255,255,0.35)" font-family="monospace" font-size="8" text-anchor="middle" letter-spacing="1">CALENDAR</text>
  </g>

  <!-- Spoke: Content (right) -->
  <line x1="362" y1="200" x2="422" y2="200" stroke="rgba(249,115,22,0.25)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <g transform="translate(422, 170)">
    <rect x="0" y="0" width="80" height="60" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
    <rect x="8" y="10" width="64" height="5" rx="2" fill="rgba(255,255,255,0.15)"/>
    <rect x="8" y="20" width="48" height="5" rx="2" fill="rgba(255,255,255,0.1)"/>
    <rect x="8" y="30" width="54" height="5" rx="2" fill="rgba(255,255,255,0.1)"/>
    <rect x="8" y="40" width="36" height="5" rx="2" fill="rgba(249,115,22,0.4)"/>
    <text x="40" y="78" fill="rgba(255,255,255,0.35)" font-family="monospace" font-size="8" text-anchor="middle" letter-spacing="1">CONTENT</text>
  </g>

  <!-- Spoke: Research (bottom) -->
  <line x1="300" y1="262" x2="300" y2="318" stroke="rgba(249,115,22,0.25)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <g transform="translate(260, 318)">
    <rect x="0" y="0" width="80" height="50" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
    <circle cx="22" cy="22" r="12" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <line x1="30" y1="30" x2="38" y2="38" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-linecap="round"/>
    <rect x="38" y="14" width="30" height="4" rx="1" fill="rgba(255,255,255,0.1)"/>
    <rect x="38" y="22" width="20" height="4" rx="1" fill="rgba(255,255,255,0.08)"/>
    <text x="40" y="66" fill="rgba(255,255,255,0.35)" font-family="monospace" font-size="8" text-anchor="middle" letter-spacing="1">RESEARCH</text>
  </g>

  <!-- Spoke: Planning (left) -->
  <line x1="238" y1="200" x2="178" y2="200" stroke="rgba(249,115,22,0.25)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <g transform="translate(98, 170)">
    <rect x="0" y="0" width="80" height="60" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
    <rect x="10" y="12" width="60" height="6" rx="2" fill="rgba(34,197,94,0.3)"/>
    <rect x="10" y="24" width="40" height="4" rx="2" fill="rgba(255,255,255,0.1)"/>
    <rect x="10" y="34" width="50" height="4" rx="2" fill="rgba(255,255,255,0.08)"/>
    <rect x="10" y="44" width="30" height="4" rx="2" fill="rgba(255,255,255,0.08)"/>
    <text x="40" y="78" fill="rgba(255,255,255,0.35)" font-family="monospace" font-size="8" text-anchor="middle" letter-spacing="1">PLANNING</text>
  </g>

  <!-- NLP command hint -->
  <text x="300" y="388" fill="rgba(255,255,255,0.15)" font-family="monospace" font-size="9" text-anchor="middle" letter-spacing="2">NATURAL LANGUAGE COMMANDS</text>
</svg>
