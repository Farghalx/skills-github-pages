<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <rect width="600" height="400" fill="#0D0D0D" />

  <!-- Background grid -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1" fill="rgba(255,255,255,0.04)"/>
  </pattern>
  <rect width="600" height="400" fill="url(#grid)" />

  <!-- LinkedIn post cards (left) -->
  <g transform="translate(70, 80)">
    <rect x="0" y="0" width="110" height="66" rx="6" fill="rgba(10,102,194,0.12)" stroke="rgba(10,102,194,0.5)" stroke-width="1.5"/>
    <circle cx="18" cy="18" r="8" fill="rgba(10,102,194,0.4)"/>
    <rect x="32" y="12" width="60" height="5" rx="2" fill="rgba(255,255,255,0.2)"/>
    <rect x="32" y="22" width="40" height="4" rx="2" fill="rgba(255,255,255,0.1)"/>
    <rect x="8" y="35" width="94" height="4" rx="2" fill="rgba(255,255,255,0.12)"/>
    <rect x="8" y="43" width="74" height="4" rx="2" fill="rgba(255,255,255,0.12)"/>
    <rect x="8" y="51" width="84" height="4" rx="2" fill="rgba(255,255,255,0.12)"/>
    <text x="55" y="88" fill="rgba(10,102,194,0.7)" font-family="monospace" font-size="8" text-anchor="middle" letter-spacing="1">LINKEDIN POSTS</text>
  </g>
  <g transform="translate(70, 170)">
    <rect x="0" y="0" width="110" height="52" rx="6" fill="rgba(10,102,194,0.08)" stroke="rgba(10,102,194,0.3)" stroke-width="1.5"/>
    <circle cx="18" cy="16" r="7" fill="rgba(10,102,194,0.3)"/>
    <rect x="32" y="10" width="50" height="4" rx="2" fill="rgba(255,255,255,0.15)"/>
    <rect x="8" y="28" width="94" height="4" rx="2" fill="rgba(255,255,255,0.1)"/>
    <rect x="8" y="38" width="64" height="4" rx="2" fill="rgba(255,255,255,0.1)"/>
  </g>
  <g transform="translate(70, 240)">
    <rect x="0" y="0" width="110" height="52" rx="6" fill="rgba(10,102,194,0.05)" stroke="rgba(10,102,194,0.2)" stroke-width="1.5"/>
    <circle cx="18" cy="16" r="7" fill="rgba(10,102,194,0.2)"/>
    <rect x="32" y="10" width="55" height="4" rx="2" fill="rgba(255,255,255,0.1)"/>
    <rect x="8" y="28" width="84" height="4" rx="2" fill="rgba(255,255,255,0.07)"/>
    <rect x="8" y="38" width="54" height="4" rx="2" fill="rgba(255,255,255,0.07)"/>
  </g>

  <!-- Flow arrows to AI brain -->
  <path d="M182 113 L230 170" stroke="rgba(249,115,22,0.3)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <path d="M182 196 L230 190" stroke="rgba(249,115,22,0.3)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <path d="M182 266 L230 210" stroke="rgba(249,115,22,0.3)" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- AI Brain (center) -->
  <g transform="translate(300, 200)">
    <circle cx="0" cy="0" r="55" fill="rgba(249,115,22,0.04)" stroke="rgba(249,115,22,0.4)" stroke-width="2"/>
    <circle cx="0" cy="0" r="38" fill="rgba(249,115,22,0.06)" stroke="rgba(249,115,22,0.2)" stroke-width="1.5"/>
    <!-- Brain icon simplified -->
    <text x="0" y="-8" fill="#f97316" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle" letter-spacing="1">AI</text>
    <text x="0" y="8" fill="#f97316" font-family="monospace" font-size="8" text-anchor="middle" letter-spacing="1">ANALYSIS</text>
    <!-- Orbit dots -->
    <circle cx="0" cy="-38" r="3" fill="#f97316" opacity="0.7"/>
    <circle cx="38" cy="0" r="3" fill="#f97316" opacity="0.5"/>
    <circle cx="0" cy="38" r="3" fill="#f97316" opacity="0.7"/>
    <circle cx="-38" cy="0" r="3" fill="#f97316" opacity="0.5"/>
  </g>

  <!-- Arrow to spreadsheet -->
  <path d="M355 200 L400 200" stroke="rgba(34,197,94,0.4)" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="398,196 406,200 398,204" fill="rgba(34,197,94,0.6)"/>

  <!-- Spreadsheet (right) -->
  <g transform="translate(408, 130)">
    <rect x="0" y="0" width="130" height="140" rx="6" fill="rgba(34,197,94,0.04)" stroke="rgba(34,197,94,0.4)" stroke-width="1.5"/>
    <!-- Tab headers -->
    <rect x="4" y="4" width="18" height="10" rx="2" fill="rgba(34,197,94,0.5)"/>
    <rect x="25" y="4" width="18" height="10" rx="2" fill="rgba(255,255,255,0.1)"/>
    <rect x="46" y="4" width="18" height="10" rx="2" fill="rgba(255,255,255,0.1)"/>
    <rect x="67" y="4" width="18" height="10" rx="2" fill="rgba(255,255,255,0.1)"/>
    <rect x="88" y="4" width="18" height="10" rx="2" fill="rgba(255,255,255,0.1)"/>
    <rect x="109" y="4" width="15" height="10" rx="2" fill="rgba(255,255,255,0.1)"/>
    <!-- Grid rows -->
    <rect x="4" y="20" width="122" height="7" rx="1" fill="rgba(34,197,94,0.2)"/>
    <rect x="4" y="32" width="100" height="5" rx="1" fill="rgba(255,255,255,0.08)"/>
    <rect x="4" y="42" width="80" height="5" rx="1" fill="rgba(255,255,255,0.08)"/>
    <rect x="4" y="52" width="110" height="5" rx="1" fill="rgba(255,255,255,0.08)"/>
    <rect x="4" y="62" width="70" height="5" rx="1" fill="rgba(255,255,255,0.08)"/>
    <rect x="4" y="72" width="95" height="5" rx="1" fill="rgba(255,255,255,0.08)"/>
    <rect x="4" y="82" width="115" height="5" rx="1" fill="rgba(255,255,255,0.08)"/>
    <rect x="4" y="92" width="60" height="5" rx="1" fill="rgba(255,255,255,0.08)"/>
    <rect x="4" y="108" width="90" height="24" rx="3" fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.3)" stroke-width="1"/>
    <text x="49" y="124" fill="#22c55e" font-family="monospace" font-size="8" text-anchor="middle" letter-spacing="1">CONTENT STRATEGY</text>
    <text x="65" y="155" fill="rgba(34,197,94,0.6)" font-family="monospace" font-size="8" text-anchor="middle" letter-spacing="1">6-TAB STRATEGY</text>
  </g>
</svg>
