<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
      <rect width="100%" height="100%" fill="#0D0D0D" />
      
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  </pattern>
  <rect width="100%" height="100%" fill="url(#grid)" />

      <!-- Agency Network / Matrix -->
      <rect x="300" y="200" width="100" height="100" rx="20" fill="none" stroke="#ea580c" stroke-width="8" />
      <rect x="550" y="150" width="100" height="100" rx="20" fill="#ea580c" />
      <rect x="800" y="250" width="100" height="100" rx="20" fill="none" stroke="#ea580c" stroke-width="8" />
      <!-- Connecting paths -->
      <path d="M 400 250 L 550 200" fill="none" stroke="#ea580c" stroke-width="6" stroke-dasharray="10 10" />
      <path d="M 650 200 L 800 300" fill="none" stroke="#ea580c" stroke-width="6" stroke-dasharray="10 10" />
      <text x="600" y="450" font-family="monospace" font-size="48" font-weight="bold" fill="#ea580c" text-anchor="middle">20 HOURS SAVED</text>
      <text x="600" y="520" font-family="monospace" font-size="24" font-weight="bold" fill="#ea580c" text-anchor="middle">SINGAPORE AGENCIES</text>
    </svg>