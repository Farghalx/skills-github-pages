<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
      <rect width="100%" height="100%" fill="#0D0D0D" />
      
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  </pattern>
  <rect width="100%" height="100%" fill="url(#grid)" />

      <!-- Clock -->
      <circle cx="600" cy="315" r="150" fill="#1A1A1A" stroke="#ea580c" stroke-width="16" />
      <path d="M 600 200 L 600 315 L 680 370" fill="none" stroke="#ea580c" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Gears (Simplified) -->
      <circle cx="800" cy="180" r="60" fill="none" stroke="#ea580c" stroke-width="12" stroke-dasharray="20 10"/>
      <circle cx="400" cy="450" r="60" fill="none" stroke="#ea580c" stroke-width="12" stroke-dasharray="20 10"/>
      <text x="600" y="550" font-family="monospace" font-size="32" font-weight="bold" fill="#ea580c" text-anchor="middle">- 20 HOURS / WEEK</text>
    </svg>