<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#111" rx="16"/>
  <text x="400" y="50" font-family="Space Grotesk, sans-serif" font-size="28" font-weight="bold" fill="#fff" text-anchor="middle">AI Lead Scoring Matrix (100 pts)</text>

  <!-- Title match -->
  <text x="100" y="120" font-family="sans-serif" font-size="18" fill="#ccc">Decision Maker Title (30 pts)</text>
  <rect x="100" y="130" width="600" height="20" fill="#333" rx="10"/>
  <rect x="100" y="130" width="600" height="20" fill="#22c55e" rx="10"/>
  
  <!-- Company Size -->
  <text x="100" y="180" font-family="sans-serif" font-size="18" fill="#ccc">Company Size Match (25 pts)</text>
  <rect x="100" y="190" width="600" height="20" fill="#333" rx="10"/>
  <rect x="100" y="190" width="400" height="20" fill="#eab308" rx="10"/>

  <!-- Industry -->
  <text x="100" y="240" font-family="sans-serif" font-size="18" fill="#ccc">Industry Fit (25 pts)</text>
  <rect x="100" y="250" width="600" height="20" fill="#333" rx="10"/>
  <rect x="100" y="250" width="500" height="20" fill="#ea580c" rx="10"/>

  <!-- Valid Email -->
  <text x="100" y="300" font-family="sans-serif" font-size="18" fill="#ccc">Valid B2B Email (20 pts)</text>
  <rect x="100" y="310" width="600" height="20" fill="#333" rx="10"/>
  <rect x="100" y="310" width="600" height="20" fill="#22c55e" rx="10"/>

  <text x="400" y="370" font-family="sans-serif" font-size="20" font-weight="bold" fill="#fff" text-anchor="middle">Tier A: 75-100 pts | Tier B: 60-74 pts</text>
</svg>