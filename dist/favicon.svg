<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="center-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <rect width="512" height="512" fill="#0A0A0A" rx="100" ry="100"/>
  
  <g filter="url(#glow)">
    <line x1="256" y1="216" x2="256" y2="120" stroke="#F97316" stroke-width="14" stroke-linecap="round"/>
    <line x1="290" y1="236" x2="380" y2="180" stroke="#F97316" stroke-width="14" stroke-linecap="round"/>
    <line x1="290" y1="276" x2="380" y2="332" stroke="#F97316" stroke-width="14" stroke-linecap="round"/>
    <line x1="256" y1="296" x2="256" y2="400" stroke="#F97316" stroke-width="14" stroke-linecap="round"/>
    <line x1="222" y1="276" x2="132" y2="332" stroke="#F97316" stroke-width="14" stroke-linecap="round"/>
    <line x1="222" y1="236" x2="132" y2="180" stroke="#F97316" stroke-width="14" stroke-linecap="round"/>
    
    <circle cx="256" cy="110" r="26" fill="#FDBA74"/>
    <circle cx="380" cy="180" r="26" fill="#FEF08A" filter="url(#center-glow)"/>
    <circle cx="380" cy="332" r="26" fill="#FDBA74"/>
    <circle cx="256" cy="402" r="26" fill="#F97316"/>
    <circle cx="132" cy="332" r="26" fill="#C2410C"/>
    <circle cx="132" cy="180" r="26" fill="#EA580C"/>
  </g>

  <circle cx="256" cy="256" r="32" fill="#FB923C" filter="url(#center-glow)"/>
</svg>
