<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
      <rect width="100%" height="100%" fill="#0D0D0D" />
      
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  </pattern>
  <rect width="100%" height="100%" fill="url(#grid)" />

      <!-- Checklist -->
      <rect x="300" y="150" width="60" height="60" rx="10" fill="none" stroke="#ea580c" stroke-width="8"/>
      <path d="M 390 180 L 800 180" stroke="#ea580c" stroke-width="8" stroke-linecap="round"/>
      <rect x="300" y="270" width="60" height="60" rx="10" fill="none" stroke="#ea580c" stroke-width="8"/>
      <path d="M 390 300 L 700 300" stroke="#ea580c" stroke-width="8" stroke-linecap="round"/>
      <rect x="300" y="390" width="60" height="60" rx="10" fill="none" stroke="#ea580c" stroke-width="8"/>
      <path d="M 390 420 L 850 420" stroke="#ea580c" stroke-width="8" stroke-linecap="round"/>
      <!-- Warning Icon Overlay -->
      <path d="M 850 150 L 900 250 L 800 250 Z" fill="none" stroke="#ea580c" stroke-width="8" stroke-linejoin="round"/>
      <path d="M 850 180 L 850 220" stroke="#ea580c" stroke-width="8" stroke-linecap="round"/>
      <circle cx="850" cy="240" r="4" fill="#ea580c"/>
