<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
      <rect width="100%" height="100%" fill="#0D0D0D" />
      
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  </pattern>
  <rect width="100%" height="100%" fill="url(#grid)" />

      <!-- Envelope center -->
      <path d="M 450 250 L 750 250 L 750 450 L 450 450 Z" fill="#1A1A1A" stroke="#ea580c" stroke-width="12" stroke-linejoin="round"/>
      <path d="M 450 250 L 600 350 L 750 250" fill="none" stroke="#ea580c" stroke-width="12" stroke-linejoin="round"/>
      <!-- Branching lines -->
      <path d="M 750 350 L 850 250" fill="none" stroke="#ea580c" stroke-width="6" stroke-dasharray="10 10" />
      <path d="M 750 350 L 900 350" fill="none" stroke="#ea580c" stroke-width="6" stroke-dasharray="10 10" />
      <path d="M 750 350 L 850 450" fill="none" stroke="#ea580c" stroke-width="6" stroke-dasharray="10 10" />
      <!-- Target Nodes -->
      <circle cx="850" cy="250" r="12" fill="#ea580c" />
      <circle cx="900" cy="350" r="12" fill="#ea580c" />
      <circle cx="850" cy="450" r="12" fill="#ea580c" />
    </svg>