<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
      <rect width="100%" height="100%" fill="#0D0D0D" />
      
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  </pattern>
  <rect width="100%" height="100%" fill="url(#grid)" />

      <!-- 3 Small People -->
      <circle cx="300" cy="250" r="30" fill="none" stroke="#ea580c" stroke-width="8"/>
      <path d="M 260 350 Q 300 280 340 350" fill="none" stroke="#ea580c" stroke-width="8" stroke-linecap="round"/>
      <circle cx="400" cy="250" r="30" fill="none" stroke="#ea580c" stroke-width="8"/>
      <path d="M 360 350 Q 400 280 440 350" fill="none" stroke="#ea580c" stroke-width="8" stroke-linecap="round"/>
      <circle cx="500" cy="250" r="30" fill="none" stroke="#ea580c" stroke-width="8"/>
      <path d="M 460 350 Q 500 280 540 350" fill="none" stroke="#ea580c" stroke-width="8" stroke-linecap="round"/>
      
      <!-- Expansion Arrows -->
      <path d="M 600 300 L 700 200 M 600 300 L 700 400 M 600 300 L 750 300" stroke="#fff" stroke-width="6" stroke-dasharray="10 10" stroke-linecap="round" opacity="0.5"/>
      
      <!-- Big Result Context -->
      <rect x="750" y="150" width="300" height="300" rx="20" fill="#1A1A1A" stroke="#ea580c" stroke-width="8"/>
      <text x="900" y="320" font-family="monospace" font-size="64" font-weight="bold" fill="#ea580c" text-anchor="middle">10x</text>
    </svg>