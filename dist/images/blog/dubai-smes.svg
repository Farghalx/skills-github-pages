<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
      <rect width="100%" height="100%" fill="#0D0D0D" />
      
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  </pattern>
  <rect width="100%" height="100%" fill="url(#grid)" />

      <!-- Minimalist Skyline/Building -->
      <path d="M 450 450 L 450 200 L 550 200 L 550 100 L 650 100 L 650 250 L 750 250 L 750 450 Z" fill="none" stroke="#ea580c" stroke-width="12" stroke-linejoin="round"/>
