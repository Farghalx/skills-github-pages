      <!-- Speed / Connections -->
      <path d="M 600 70 L 600 10" stroke="#ea580c" stroke-width="8" stroke-dasharray="10 10" />
      <path d="M 700 220 L 700 160" stroke="#ea580c" stroke-width="8" stroke-dasharray="10 10" />
      <circle cx="600" cy="180" r="16" fill="#ea580c" />
      <!-- DUBAI Text overlay -->
      <text x="600" y="550" font-family="monospace" font-size="64" font-weight="bold" fill="#ea580c" text-anchor="middle" letter-spacing="10">DUBAI AI</text>
