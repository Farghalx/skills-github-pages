<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#111" rx="16"/>
  
  <text x="400" y="60" font-family="Space Grotesk, sans-serif" font-size="28" font-weight="bold" fill="#fff" text-anchor="middle">Cost Comparison vs Hiring</text>
  
  <rect x="100" y="120" width="250" height="150" fill="#1A1A1A" stroke="#ef4444" stroke-width="2" rx="12"/>
  <text x="225" y="160" font-family="sans-serif" font-size="20" font-weight="bold" fill="#ef4444" text-anchor="middle">Employee (Monthly)</text>
  <text x="225" y="210" font-family="monospace" font-size="32" font-weight="bold" fill="#fff" text-anchor="middle">EGP 12,000</text>
  <text x="225" y="245" font-family="sans-serif" font-size="14" fill="#999" text-anchor="middle">Recurring Every Month</text>

  <rect x="450" y="120" width="250" height="150" fill="#1A1A1A" stroke="#22c55e" stroke-width="2" rx="12"/>
  <text x="575" y="160" font-family="sans-serif" font-size="20" font-weight="bold" fill="#22c55e" text-anchor="middle">AI System</text>
  <text x="575" y="210" font-family="monospace" font-size="32" font-weight="bold" fill="#fff" text-anchor="middle">EGP 25,000</text>
